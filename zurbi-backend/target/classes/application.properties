# Banco de dados
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/zurbi_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:zurbi_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:zurbi_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Upload (limite por arquivo e por requisição — docs/business-rules.md)
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:30MB}

# MinIO / S3-compatível
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:zurbi-midias}
minio.region=${MINIO_REGION:}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}

# Ollama — assistente do gestor (Central de Operações)
zurbi.ollama.enabled=${ZURBI_OLLAMA_ENABLED:true}
zurbi.ollama.base-url=${ZURBI_OLLAMA_BASE_URL:http://localhost:11434}
# Padrão rápido: qwen2.5:1.5b. Para mais qualidade (mais lento): llama3.2
zurbi.ollama.model=${ZURBI_OLLAMA_MODEL:qwen2.5:1.5b}
zurbi.ollama.timeout-seconds=${ZURBI_OLLAMA_TIMEOUT_SECONDS:120}
zurbi.ollama.max-historico-mensagens=${ZURBI_OLLAMA_MAX_HISTORICO:4}
zurbi.ollama.max-chamados-no-contexto=${ZURBI_OLLAMA_MAX_CHAMADOS:8}
zurbi.ollama.max-tokens-resposta=${ZURBI_OLLAMA_MAX_TOKENS:320}
zurbi.ollama.num-ctx=${ZURBI_OLLAMA_NUM_CTX:2048}
zurbi.ollama.keep-alive-minutes=${ZURBI_OLLAMA_KEEP_ALIVE:15}

# Requisições longas do assistente (Tomcat)
server.tomcat.connection-timeout=320000
