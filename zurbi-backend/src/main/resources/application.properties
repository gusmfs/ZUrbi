# src/main/resources/application.properties

# Banco de dados
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/zurbi_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:zurbi_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:zurbi_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Upload (limite por arquivo e por requisição — docs/business-rules.md)
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:30MB}

# MinIO / S3-compatível
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:zurbi-midias}
minio.region=${MINIO_REGION:}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
