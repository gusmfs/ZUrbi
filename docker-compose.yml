# docker-compose.yml
# Variáveis lidas automaticamente do .env na mesma pasta
services:
  postgres:
    image: postgres:16-alpine
    container_name: zurbi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - zurbi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: zurbi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - zurbi_minio:/data

  app:
    build: .
    container_name: zurbi-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      ZURBI_OLLAMA_ENABLED: ${ZURBI_OLLAMA_ENABLED:-true}
      ZURBI_OLLAMA_BASE_URL: ${ZURBI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ZURBI_OLLAMA_MODEL: ${ZURBI_OLLAMA_MODEL:-qwen2.5:1.5b}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # Perfil opcional: docker compose --profile ai up -d
  ollama:
    image: ollama/ollama:latest
    container_name: zurbi-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - zurbi_ollama:/root/.ollama

volumes:
  zurbi_pgdata:
  zurbi_minio:
  zurbi_ollama:
